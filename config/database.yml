default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>

development:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
  # url: <%= ENV["DATABASE_URL_DEVEL"] %>

test:
  <<: *default
  url: <%= ENV["DATABASE_URL_TEST"] || ENV["DATABASE_URL"] %>

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
